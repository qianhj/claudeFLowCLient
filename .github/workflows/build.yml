name: Build Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (Windows)
        shell: powershell
        run: |
          $gitConfig = "$env:USERPROFILE\.gitconfig"
          if (-not (Test-Path $gitConfig)) { New-Item -ItemType File -Path $gitConfig -Force }
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          $env:GIT_CONFIG_GLOBAL = "$env:USERPROFILE\.gitconfig"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: '[0] Clean previous build output'
        shell: powershell
        run: |
          if (Test-Path "electron\dist") {
            Remove-Item -Recurse -Force "electron\dist"
          }

      - name: '[1] npm install server'
        shell: powershell
        run: |
          cd server
          npm install
          if ($LASTEXITCODE -ne 0) { throw "server npm install failed" }

      - name: '[2] npm install client'
        shell: powershell
        run: |
          cd client
          npm install
          if ($LASTEXITCODE -ne 0) { throw "client npm install failed" }

      - name: '[3] build server'
        shell: powershell
        run: |
          cd server
          npx --yes tsc
          if ($LASTEXITCODE -ne 0) { throw "server build failed" }

      - name: '[4] build client'
        shell: powershell
        run: |
          cd client
          npx --yes vite build
          if ($LASTEXITCODE -ne 0) { throw "client build failed" }

      - name: '[5] Replace server node_modules with production-only'
        shell: powershell
        run: |
          cd server
          Remove-Item -Recurse -Force node_modules
          npm install --omit=dev
          if ($LASTEXITCODE -ne 0) { throw "server prod install failed" }

      - name: '[6] compile electron'
        shell: powershell
        run: |
          cd electron
          npm install
          if ($LASTEXITCODE -ne 0) { throw "electron npm install failed" }
          node ".\node_modules\typescript\bin\tsc"
          if ($LASTEXITCODE -ne 0) { throw "electron tsc failed" }

      - name: '[6.5] copy app-builder-bin from pnpm store'
        shell: powershell
        run: |
          $pnpmStore = "$env:GITHUB_WORKSPACE\node_modules\.pnpm"
          if (-not (Test-Path $pnpmStore)) {
            Write-Host "pnpm store not found at $pnpmStore, skipping app-builder-bin copy"
            exit 0
          }
          $appBuilderDir = Get-ChildItem $pnpmStore -Filter "app-builder-bin*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($appBuilderDir) {
            $src = Join-Path $appBuilderDir.FullName "node_modules\app-builder-bin"
            $dst = "electron\node_modules\app-builder-bin"
            if (Test-Path $src) {
              robocopy $src $dst /E /NFL /NDL /NJH /NJS /NC /NS 2>&1 | Out-Null
              Write-Host "app-builder-bin copied successfully"
            } else {
              Write-Host "Source not found: $src"
            }
          } else {
            Write-Host "app-builder-bin not found in pnpm store"
          }

      - name: '[7] electron-builder pack'
        shell: powershell
        run: |
          cd electron
          node ".\node_modules\electron-builder\cli.js" --config electron-builder.yml
          if ($LASTEXITCODE -ne 0) { throw "electron-builder failed" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (macOS)
        run: |
          touch ~/.gitconfig
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: '[0] Clean previous build output'
        run: |
          if [ -d "electron/dist" ]; then
            rm -rf electron/dist
          fi

      - name: '[1] npm install server'
        run: |
          cd server
          npm install

      - name: '[2] npm install client'
        run: |
          cd client
          npm install

      - name: '[3] build server'
        run: |
          cd server
          npx tsc

      - name: '[4] build client'
        run: |
          cd client
          npx vite build

      - name: '[5] Replace server node_modules with production-only'
        run: |
          cd server
          rm -rf node_modules
          npm install --omit=dev

      - name: '[6] compile electron'
        run: |
          cd electron
          npm install
          node "./node_modules/typescript/bin/tsc"

      - name: '[7] electron-builder pack'
        run: |
          cd electron
          node "./node_modules/electron-builder/cli.js" --config electron-builder.yml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        run: |
          gh release delete ${{ github.ref_name }} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
