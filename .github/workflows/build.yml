name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 国内镜像加速 Electron 下载（如不需要可删除或改为 github 官方）
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
  ELECTRON_BUILDER_CACHE: "${{ github.workspace }}/.cache/electron-builder"
  NODE_VERSION: 20

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (macOS)
        run: |
          touch ~/.gitconfig
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ========== 缓存优化 ==========
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ${{ github.workspace }}/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            server/node_modules
            client/node_modules
            electron/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('server/package-lock.json', 'client/package-lock.json', 'electron/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      # ========== 依赖安装（并行） ==========
      - name: '[1] Install dependencies'
        run: |
          (cd server && npm ci) &
          (cd client && npm ci) &
          wait

      # ========== 构建 ==========
      - name: '[2] Build server & client'
        run: |
          cd server && npx tsc
          cd ../client && npx vite build

      # ========== 优化：Server 只保留生产依赖 ==========
      - name: '[3] Prune server devDependencies'
        run: cd server && npm prune --omit=dev

      # ========== Electron 构建 ==========
      - name: '[4] Install & compile electron'
        run: |
          cd electron
          npm ci
          node "./node_modules/typescript/bin/tsc"

      - name: '[5] electron-builder pack'
        run: |
          cd electron
          node "./node_modules/electron-builder/cli.js" --config electron-builder.yml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip
          retention-days: 7

  release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        continue-on-error: true
        run: |
          gh release delete ${{ github.ref_name }} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
