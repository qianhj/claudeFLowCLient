name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 国内镜像加速 Electron 下载
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
  ELECTRON_BUILDER_CACHE: "${{ github.workspace }}/.cache/electron-builder"
  NODE_VERSION: 20

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (macOS)
        run: |
          touch ~/.gitconfig
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # ========== 依赖安装 ==========
      - name: '[1] Install dependencies'
        run: pnpm install --no-frozen-lockfile

      # ========== 构建 ==========
      - name: '[2] Build server & client'
        run: |
          pnpm --filter server build
          pnpm --filter client build

      # ========== 优化：创建精简版 server ==========
      - name: '[3] Create optimized server'
        run: |
          # 创建精简版 server（仅生产依赖）
          rm -rf electron/server-prod
          mkdir -p electron/server-prod
          # 复制 package.json
          cp server/package.json electron/server-prod/
          # 安装生产依赖（使用 npm 避免 pnpm 链接问题）
          cd electron/server-prod
          npm install --omit=dev --no-audit --no-fund
          cd ../..
          # 复制 dist
          cp -r server/dist electron/server-prod/

      # ========== Electron 构建 ==========
      - name: '[4] Build electron'
        run: |
          pnpm --filter electron build

      - name: '[5] electron-builder pack'
        run: |
          cd electron
          pnpm exec electron-builder --config electron-builder.yml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip
          retention-days: 7

  release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        continue-on-error: true
        run: |
          gh release delete ${{ github.ref_name }} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
