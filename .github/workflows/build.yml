name: Build Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (Windows)
        shell: powershell
        run: |
          $gitConfig = "$env:USERPROFILE\.gitconfig"
          if (-not (Test-Path $gitConfig)) { New-Item -ItemType File -Path $gitConfig -Force }
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        shell: powershell
        run: |
          $env:GIT_CONFIG_GLOBAL = "$env:USERPROFILE\.gitconfig"
          pnpm install --no-frozen-lockfile

      - name: Build server & client
        run: pnpm build

      - name: Build Electron
        shell: powershell
        run: |
          $env:GIT_CONFIG_GLOBAL = "$env:USERPROFILE\.gitconfig"
          cd electron
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm run:pack

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (macOS)
        run: |
          touch ~/.gitconfig
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          export GIT_CONFIG_GLOBAL="$HOME/.gitconfig"
          pnpm install --no-frozen-lockfile

      - name: Build server & client
        run: pnpm build

      - name: Build Electron
        run: |
          export GIT_CONFIG_GLOBAL="$HOME/.gitconfig"
          cd electron
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm run:pack

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        run: |
          gh release delete ${{ github.ref_name }} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
