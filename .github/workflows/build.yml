name: Build Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (Windows)
        shell: powershell
        run: |
          $gitConfig = "$env:USERPROFILE\.gitconfig"
          if (-not (Test-Path $gitConfig)) { New-Item -ItemType File -Path $gitConfig -Force }
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        shell: powershell
        run: |
          $env:GIT_CONFIG_GLOBAL = "$env:USERPROFILE\.gitconfig"
          cd server
          npm install
          cd ../client
          npm install

      - name: Build server & client
        run: |
          cd server
          npx tsc
          cd ../client
          npx vite build

      - name: Install production deps (omit dev)
        shell: powershell
        run: |
          cd server
          npm install --omit=dev

      - name: Install Electron and build
        shell: powershell
        run: |
          $env:GIT_CONFIG_GLOBAL = "$env:USERPROFILE\.gitconfig"
          cd electron
          npm install
          npx tsc

      - name: Copy app-builder-bin from pnpm store
        shell: powershell
        run: |
          $pnpmStore = "node_modules\.pnpm"
          $appBuilderDir = Get-ChildItem $pnpmStore -Filter "app-builder-bin*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($appBuilderDir) {
              $src = Join-Path $appBuilderDir.FullName "node_modules\app-builder-bin"
              $dst = "electron\node_modules\app-builder-bin"
              if (Test-Path $src) {
                  robocopy $src $dst /E /NFL /NDL /NJH /NJS /NC /NS 2>&1 | Out-Null
              }
          }

      - name: Electron pack
        shell: powershell
        run: |
          cd electron
          npx electron-builder --config electron-builder.yml

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS (macOS)
        run: |
          touch ~/.gitconfig
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          cd server
          npm install
          cd ../client
          npm install

      - name: Build server & client
        run: |
          cd server
          npx tsc
          cd ../client
          npx vite build

      - name: Install production deps (omit dev)
        run: |
          cd server
          npm install --omit=dev

      - name: Install Electron and build
        run: |
          cd electron
          npm install
          npx tsc

      - name: Copy app-builder-bin from pnpm store
        run: |
          pnpmStore="node_modules/.pnpm"
          appBuilderDir=$(find $pnpmStore -maxdepth 1 -type d -name "app-builder-bin*" | head -1)
          if [ -n "$appBuilderDir" ]; then
            src="$appBuilderDir/node_modules/app-builder-bin"
            dst="electron/node_modules/app-builder-bin"
            if [ -d "$src" ]; then
              cp -r "$src" "$dst"
            fi
          fi

      - name: Electron pack
        run: |
          cd electron
          npx electron-builder --config electron-builder.yml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Delete existing release
        run: |
          gh release delete ${{ github.ref_name }} -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
