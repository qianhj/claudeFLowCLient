name: Build Cross-Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 强制 Git 使用 HTTPS 代替 SSH
  GIT_CONFIG_GLOBAL: ~/.gitconfig

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Build server & client
        run: pnpm build

      - name: Build Electron
        shell: bash
        run: |
          cd electron
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm run:pack

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Git HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build server & client
        run: pnpm build

      - name: Build Electron
        run: |
          cd electron
          pnpm install --no-frozen-lockfile
          pnpm build
          pnpm run:pack

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            electron/dist/release/*.dmg
            electron/dist/release/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/macos-installer/*.zip
          draft: false
          prerelease: false
          # 覆盖已存在的文件
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
