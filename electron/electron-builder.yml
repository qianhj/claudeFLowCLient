appId: com.hz.cc-flow
productName: "HZ CC Flow"
copyright: "Copyright © 2024 HZ"

files:
  - dist/**/*
  - "!dist/**/*.map"

# 使用精简版 server-prod 替代完整 server
extraResources:
  - from: "server-prod"
    to: "server"
    filter:
      - "**/*"
      - "!**/.cache/**"
      - "!**/.pnpm/**"
  - from: "../client/dist"
    to: "client/dist"
    filter:
      - "**/*"

directories:
  output: "dist/release"
  buildResources: "assets"

win:
  target:
    - target: nsis
      arch:
        - x64
  signtoolOptions:
    signingHashAlgorithms: []

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "HZ CC Flow"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  identity: null
  gatekeeperAssess: false
  hardenedRuntime: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: "HZ"

# 重建原生模块（node-pty）- 暂时禁用测试
# afterPack: "scripts/rebuild-native.js"

asar: true
asarUnpack:
  - "**/*.node"
