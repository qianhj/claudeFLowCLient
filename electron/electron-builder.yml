appId: com.hz.cc-flow
productName: "HZ CC Flow"
copyright: "Copyright © 2024 HZ"

# 主进程入口（electron/dist/main.js 编译产物）
files:
  - dist/**/*
  - "!dist/**/*.map"

# 额外资源：后端 dist 和前端 dist 打包进 resources/
extraResources:
  - from: "../server/dist"
    to: "server/dist"
    filter:
      - "**/*"
  - from: "../server/package.json"
    to: "server/package.json"
  - from: "../server/node_modules"
    to: "server/node_modules"
    filter:
      - "**/*"
      - "!**/.cache/**"
  - from: "../client/dist"
    to: "client/dist"
    filter:
      - "**/*"

directories:
  output: "dist/release"
  buildResources: "assets"

# Windows 打包配置
win:
  target:
    - target: nsis
      arch:
        - x64
  # 不签名（无证书），禁用代码签名工具下载
  signingHashAlgorithms: []
  sign: null

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "HZ CC Flow"

# macOS 打包配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # 不签名（无证书）
  identity: null
  # 禁用 Gatekeeper 评估（需要签名时才可用）
  gatekeeperAssess: false
  #  hardenedRuntime 需要签名，禁用
  hardenedRuntime: false

# Linux 打包配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: "HZ"

# 重建原生模块（node-pty）
afterPack: "scripts/rebuild-native.js"

# 不将 node_modules 自动打包（我们手动通过 extraResources 包含）
asar: true
asarUnpack:
  - "**/*.node"
